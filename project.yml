name: SensiUltralock
options:
  bundleIdPrefix: com.aistudio
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  SensiUltralock:
    type: application
    platform: iOS
    sources:
      - SensiUltralock
    settings:
      base:
        INFOPLIST_FILE: SensiUltralock/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.aistudio.ultralock-optimizer.ios
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: Yes
        CODE_SIGNING_ALLOWED: Yes
    info:
      path: SensiUltralock/Resources/Info.plist
    entitlements:
      path: SensiUltralock/Resources/SensiUltralock.entitlements
