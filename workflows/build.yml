name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build .app (unsigned — for sideloading)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app
        run: |
          xcodebuild -project SensiUltralock.xcodeproj \
                     -scheme SensiUltralock \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build/derived \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     build

      - name: Locate and package .app
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          mkdir -p build/output
          cp -R "$APP_PATH" build/output/SensiUltralock.app
          cd build/output && zip -r ../SensiUltralock.zip SensiUltralock.app
          echo "✅ .app size: $(du -sh build/output/SensiUltralock.app | cut -f1)"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: SensiUltralock-Unsigned
          path: build/output/SensiUltralock.app
          compression-level: 9

      - name: Upload .zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: SensiUltralock-Zip
          path: build/SensiUltralock.zip
          compression-level: 9

  # === OPTIONAL: Signed IPA (cần Apple ID free hoặc paid) ===
  signed-ipa:
    name: Build IPA (cần secrets)
    needs: build
    if: ${{ secrets.APPLE_ID != '' }}
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & Export IPA (free Apple ID)
        run: |
          xcodebuild -project SensiUltralock.xcodeproj \
                     -scheme SensiUltralock \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath build/SensiUltralock.xcarchive \
                     -allowProvisioningUpdates \
                     archive

          xcodebuild -exportArchive \
                     -archivePath build/SensiUltralock.xcarchive \
                     -exportPath build/ \
                     -exportOptionsPlist ExportOptions.plist \
                     -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SensiUltralock-IPA
          path: build/SensiUltralock.ipa
          compression-level: 0
