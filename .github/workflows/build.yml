name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen 2.40.0 (compatible)
        run: |
          curl -L -o xcodegen.zip "https://github.com/YonasKolb/XcodeGen/releases/download/2.40.0/xcodegen-2.40.0-universal.zip"
          unzip -o xcodegen.zip -d xcodegen
          echo "$(pwd)/xcodegen" >> $GITHUB_PATH

      - name: Generate project
        run: xcodegen generate

      - name: Build unsigned .app
        run: |
          xcodebuild -project SensiUltralock.xcodeproj \
                     -scheme SensiUltralock \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build/derived \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     build

      - name: Package .app
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          mkdir -p build/output
          cp -R "$APP_PATH" build/output/SensiUltralock.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SensiUltralock-Unsigned
          path: build/output/SensiUltralock.app
