name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build .ipa (unsigned, sideload-ready)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          brew untap aws/tap 2>/dev/null || true
          HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew install xcodegen

      - name: Generate Xcode project
        run: |
          rm -rf SensiUltralock.xcodeproj
          xcodegen generate
          sed -i '' 's/objectVersion = 77/objectVersion = 56/g' SensiUltralock.xcodeproj/project.pbxproj
          sed -i '' 's/archiveVersion = 2/archiveVersion = 1/g' SensiUltralock.xcodeproj/project.pbxproj

      - name: Build unsigned .app for device
        run: |
          xcodebuild -project SensiUltralock.xcodeproj \
                     -scheme SensiUltralock \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build/derived \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     build

      - name: Package .ipa
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          mkdir -p build/output/Payload
          cp -R "$APP_PATH" build/output/Payload/
          cd build/output
          zip -r ../SensiUltralock.ipa Payload/
          echo "✅ .ipa size: $(du -sh ../SensiUltralock.ipa | cut -f1)"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: SensiUltralock-IPA
          path: build/SensiUltralock.ipa
          compression-level: 0
