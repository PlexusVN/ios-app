name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build .zip (Appetize.io + sideload)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          brew untap aws/tap 2>/dev/null || true
          HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Downgrade project format for Xcode 15.4
        run: |
          PBX="SensiUltralock.xcodeproj/project.pbxproj"
          sed -i '' 's/objectVersion = [0-9][0-9];/objectVersion = 56;/' "$PBX"
          sed -i '' 's/compatibilityVersion = "Xcode [0-9][0-9]*\.[0-9]*"/compatibilityVersion = "Xcode 14.0"/' "$PBX"

      - name: Build for iOS Simulator (Appetize-ready)
        run: |
          xcodebuild -project SensiUltralock.xcodeproj \
                     -scheme SensiUltralock \
                     -configuration Release \
                     -sdk iphonesimulator \
                     -destination "generic/platform=iOS Simulator" \
                     -derivedDataPath build/derived \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     build

      - name: Package .zip
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          mkdir -p build/output
          cp -R "$APP_PATH" build/output/SensiUltralock.app
          cd build/output
          zip -r ../SensiUltralock.zip SensiUltralock.app
          echo "✅ .zip size: $(du -sh ../SensiUltralock.zip | cut -f1)"

      - name: Upload .zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: SensiUltralock-Appetize
          path: build/SensiUltralock.zip
          compression-level: 0
